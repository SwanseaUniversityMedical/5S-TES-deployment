Database: boltdb

Compute: local

Server:
  HTTPPort: "8000"
  RPCPort: "9090"

Worker:
  WorkDir: "/opt/funnel"
  PollingRate: 5s
  LogUpdateRate: 5s
  LogTailSize: 10000 # 10 KB
  LeaveWorkDir: false
  MaxParallelTransfers: 10

BoltDB:
  Path: "/opt/funnel/data/funnel.db"

GenericS3:
  - Disabled: false
    Endpoint: "http://minioTRE:9000" # URL to MinIO. In Production, the Key and secret should be set in the .env file
    Key: "${MinioKey}"
    Secret: "${MinioSecret}"
